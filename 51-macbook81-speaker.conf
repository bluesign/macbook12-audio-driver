context.objects = [
    {   factory = adapter
        args = {
            factory.name     = api.alsa.pcm.sink
            node.name        = "MacBook_Speaker_Raw"
            node.description = "MacBook Speaker (Raw)"
            api.alsa.path    = "hw:0,2"
            api.alsa.period-size = 1024
            api.alsa.headroom    = 1024
            audio.format     = "S16LE"
            audio.rate       = 44100
            audio.channels   = 4
            audio.position   = [ FL FR RL RR ]
            media.class      = "Audio/Sink"
            node.pause-on-idle = false
            session.suspend-timeout-seconds = 0
        }
    }
]

context.modules = [
    # Stereo→4ch crossover: FL/FR = tweeters (HPF), RL/RR = woofers (LPF + bass boost)
    {   name = libpipewire-module-filter-chain
        args = {
            node.name        = "MacBook_Speaker"
            node.description = "MacBook Speaker"
            media.class      = "Audio/Sink"
            filter.graph = {
                nodes = [
                    { type = builtin  name = inL     label = copy }
                    { type = builtin  name = inR     label = copy }
                    # Tweeters: high-pass at 2kHz
                    { type = builtin  name = hpFL    label = bq_highpass
                      control = { "Freq" = 2000.0 "Q" = 0.707 } }
                    { type = builtin  name = hpFR    label = bq_highpass
                      control = { "Freq" = 2000.0 "Q" = 0.707 } }
                    # Woofers: low-pass at 2kHz + bass boost
                    { type = builtin  name = lpRL    label = bq_lowpass
                      control = { "Freq" = 2000.0 "Q" = 0.707 } }
                    { type = builtin  name = lpRR    label = bq_lowpass
                      control = { "Freq" = 2000.0 "Q" = 0.707 } }
                    { type = builtin  name = bassRL  label = bq_lowshelf
                      control = { "Freq" = 200.0 "Q" = 0.707 "Gain" = 10.0 } }
                    { type = builtin  name = bassRR  label = bq_lowshelf
                      control = { "Freq" = 200.0 "Q" = 0.707 "Gain" = 10.0 } }
                ]
                links = [
                    { output = "inL:Out"  input = "hpFL:In" }
                    { output = "inL:Out"  input = "lpRL:In" }
                    { output = "inR:Out"  input = "hpFR:In" }
                    { output = "inR:Out"  input = "lpRR:In" }
                    { output = "lpRL:Out" input = "bassRL:In" }
                    { output = "lpRR:Out" input = "bassRR:In" }
                ]
                inputs  = [ "inL:In" "inR:In" ]
                outputs = [ "hpFL:Out" "hpFR:Out" "bassRL:Out" "bassRR:Out" ]
            }
            capture.props = {
                media.class    = "Audio/Sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name         = "MacBook_Speaker_DSP_Out"
                media.class       = "Stream/Output/Audio"
                audio.channels    = 4
                audio.position    = [ FL FR RL RR ]
                node.target       = "MacBook_Speaker_Raw"
            }
        }
    }
]
